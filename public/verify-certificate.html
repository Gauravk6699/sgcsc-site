<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification — SGCSC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-area h1 { font-size: 1.6rem; color: #1a3a5c; }
    .logo-area p  { font-size: 0.9rem; color: #666; margin-top: 4px; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      max-width: 540px;
      width: 100%;
      padding: 36px 32px;
    }

    /* ── LOADING ── */
    .state-loading {
      text-align: center;
      padding: 24px 0;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e0e0e0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── VALID ── */
    .badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 28px;
    }
    .badge.valid   { background: #e6f4ea; color: #1e7e34; }
    .badge.invalid { background: #fce8e6; color: #c0392b; }
    .badge svg { flex-shrink: 0; }

    .cert-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a3a5c;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e8edf2;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
    }
    @media (max-width: 480px) { .field-grid { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; }
    .field label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 3px;
    }
    .field span {
      font-size: 0.97rem;
      color: #1a3a5c;
      font-weight: 500;
    }

    .field.full { grid-column: 1 / -1; }

    /* ── ERROR ── */
    .state-error { text-align: center; padding: 16px 0; }
    .state-error .icon { font-size: 3rem; margin-bottom: 12px; }
    .state-error h2 { color: #c0392b; margin-bottom: 8px; }
    .state-error p  { color: #666; font-size: 0.9rem; }

    .cert-no-tag {
      display: inline-block;
      background: #f0f4f8;
      color: #555;
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 20px;
      font-family: monospace;
    }

    footer {
      margin-top: 32px;
      font-size: 0.8rem;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="logo-area">
    <h1>SGCSC Certificate Verification</h1>
    <p>Shree Ganpati Computer and Study Centre</p>
  </div>

  <div class="card" id="card">
    <div class="state-loading" id="stateLoading">
      <div class="spinner"></div>
      <p>Verifying certificate...</p>
    </div>
  </div>

  <footer>This verification is provided by SGCSC. Scan result is real-time.</footer>

<script>
  // ── Detect certificate type from URL path ──────────────────────────────────
  // /verify/<certNo>         → student certificate
  // /verify/typing/<certNo>  → typing certificate
  const pathParts = window.location.pathname.split('/').filter(Boolean);
  const isTyping  = pathParts.includes('typing');
  const certNo    = decodeURIComponent(pathParts[pathParts.length - 1] || '');

  function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    if (isNaN(dt)) return d;
    return dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function field(label, value, full) {
    return `
      <div class="field${full ? ' full' : ''}">
        <label>${label}</label>
        <span>${value || '—'}</span>
      </div>`;
  }

  function showValidStudent(cert) {
    document.getElementById('card').innerHTML = `
      <div class="badge valid">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Certificate Verified ✓
      </div>
      <div class="cert-no-tag">Cert No: ${certNo}</div>
      <div class="cert-title">${cert.studentName || cert.applicantName || cert.name || 'Student'}</div>
      <div class="field-grid">
        ${field('Course',           cert.courseName)}
        ${field('Grade',            cert.grade)}
        ${field('Course Duration',  cert.courseDuration)}
        ${field('Period From',      fmtDate(cert.coursePeriodFrom))}
        ${field('Period To',        fmtDate(cert.coursePeriodTo))}
        ${field('Date of Issue',    fmtDate(cert.dateOfIssue))}
        ${field('Institute',        cert.instituteName || cert.centerName, true)}
        ${field('Enrollment No.',   cert.enrollmentNumber || cert.enrollmentNo)}
        ${field('Certificate No.',  cert.certificateNumber || cert.certificateNo)}
      </div>`;
  }

  function showValidTyping(cert) {
    document.getElementById('card').innerHTML = `
      <div class="badge valid">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Typing Certificate Verified ✓
      </div>
      <div class="cert-no-tag">Cert No: ${certNo}</div>
      <div class="cert-title">${cert.studentName || 'Student'}</div>
      <div class="field-grid">
        ${field('Father / Husband',  cert.fatherHusbandName)}
        ${field('Mother',            cert.motherName)}
        ${field('Computer Typing',   cert.computerTyping)}
        ${field('Words Per Minute',  cert.wordsPerMinute)}
        ${field('Grade',             cert.grade)}
        ${field('Session From',      cert.sessionFrom)}
        ${field('Session To',        cert.sessionTo)}
        ${field('Date of Issue',     fmtDate(cert.dateOfIssue))}
        ${field('Study Centre',      cert.studyCentre, true)}
        ${field('Enrollment No.',    cert.enrollmentNumber)}
        ${field('Certificate No.',   cert.certificateNo)}
      </div>`;
  }

  function showInvalid() {
    document.getElementById('card').innerHTML = `
      <div class="badge invalid">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        Certificate Not Found
      </div>
      <div class="state-error">
        <div class="icon">🔍</div>
        <h2>No record found</h2>
        <p>No certificate matching <strong>${certNo}</strong> was found in our records.<br>
        Please check the certificate number or contact the institute.</p>
      </div>`;
  }

  function showError(msg) {
    document.getElementById('card').innerHTML = `
      <div class="state-error">
        <div class="icon">⚠️</div>
        <h2>Verification Failed</h2>
        <p>${msg || 'An error occurred. Please try again later.'}</p>
      </div>`;
  }

  async function verify() {
    if (!certNo) { showError('No certificate number in URL.'); return; }

    try {
      let data;
      if (isTyping) {
        // Typing certificate: GET /verify/typing-certificate/:certNo
        const res = await fetch(`/verify/typing-certificate/${encodeURIComponent(certNo)}`);
        if (!res.ok) { showInvalid(); return; }
        data = await res.json();
        if (data.success && data.data) {
          showValidTyping(data.data);
        } else {
          showInvalid();
        }
      } else {
        // Student certificate: POST /verify/certificate
        const res = await fetch('/verify/certificate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ certNo: certNo })
        });
        if (!res.ok) { showInvalid(); return; }
        data = await res.json();
        if (data.success && data.data) {
          showValidStudent(data.data);
        } else {
          showInvalid();
        }
      }
    } catch (err) {
      console.error('Verification error:', err);
      showError('Could not reach the server. Please try again.');
    }
  }

  verify();
</script>
</body>
</html>
